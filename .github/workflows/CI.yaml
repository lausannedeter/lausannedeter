name: CI

on:
  push:
    branches: [main]

jobs:
  lint-and-check:
    name: Lint & Sync Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check JSON validity (data/events.json)
        run: node -e "JSON.parse(require('fs').readFileSync('data/events.json', 'utf8')); console.log('✔ data/events.json is valid JSON')"

      - name: Validate event schema
        run: node scripts/validate-events.js
